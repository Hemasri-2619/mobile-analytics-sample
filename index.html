<!DOCTYPE html>
<html>
<head>
<title>My E-commerce Store</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-YQRG46WMCN"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-YQRG46WMCN');
</script>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#333;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.cart{
background:white;
color:black;
padding:8px 15px;
border-radius:5px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#28a745;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
margin-top:5px;
}

button:hover{
background:#218838;
}

.buy{
background:#007bff;
}

.buy:hover{
background:#0056b3;
}

img{
width:150px;
}

</style>
</head>

<body>

<header>
<h2>My E-commerce Store</h2>

<div class="cart">
Cart: <span id="cart-count">0</span>
<button onclick="viewCart()">View Cart</button>
<button class="buy" onclick="buyNow()">Buy Now</button>
</div>

</header>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Mobile Phone</h3>
<p>₹15000</p>
<button onclick="addToCart('Mobile Phone')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Headphones</h3>
<p>₹2000</p>
<button onclick="addToCart('Headphones')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Smart Watch</h3>
<p>₹5000</p>
<button onclick="addToCart('Smart Watch')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Laptop</h3>
<p>₹55000</p>
<button onclick="addToCart('Laptop')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Tablet</h3>
<p>₹18000</p>
<button onclick="addToCart('Tablet')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Bluetooth Speaker</h3>
<p>₹3000</p>
<button onclick="addToCart('Bluetooth Speaker')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Gaming Mouse</h3>
<p>₹1200</p>
<button onclick="addToCart('Gaming Mouse')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Keyboard</h3>
<p>₹1500</p>
<button onclick="addToCart('Keyboard')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Power Bank</h3>
<p>₹1000</p>
<button onclick="addToCart('Power Bank')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Camera</h3>
<p>₹35000</p>
<button onclick="addToCart('Camera')">Add to Cart</button>
</div>

</div>

<script>

let cart = [];
let count = 0;

function addToCart(product){

cart.push(product);
count++;

document.getElementById("cart-count").innerText = count;

alert(product + " added to cart!");

gtag('event','add_to_cart',{
event_category:'ecommerce',
event_label:product
});

}

function viewCart(){

if(cart.length === 0){
alert("Cart is empty");
}
else{
alert("Products in cart: " + cart.join(", "));
}

gtag('event','view_cart',{
event_category:'ecommerce'
});

}

function buyNow(){

if(cart.length === 0){
alert("Your cart is empty!");
}
else{
alert("Purchase successful! Items bought: " + cart.join(", "));
cart = [];
count = 0;
document.getElementById("cart-count").innerText = 0;
}

gtag('event','purchase',{
event_category:'ecommerce'
});

}

</script>

</body>
</html>
