<!DOCTYPE html>
<html>
<head>
<title>My E-commerce Store</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-6W4XVG15VX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-6W4XVG15VX');
</script>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#333;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart{
background:white;
color:black;
padding:8px 15px;
border-radius:5px;
}

.products{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
width:200px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#28a745;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#218838;
}

</style>
</head>

<body>

<header>
<h2>My E-commerce Store</h2>
<div class="cart">
Cart: <span id="cart-count">0</span>
</div>
</header>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Mobile Phone</h3>
<p>₹15000</p>
<button onclick="addToCart('Mobile Phone')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Headphones</h3>
<p>₹2000</p>
<button onclick="addToCart('Headphones')">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h3>Smart Watch</h3>
<p>₹5000</p>
<button onclick="addToCart('Smart Watch')">Add to Cart</button>
</div>

</div>

<script>

let cart = 0;

function addToCart(product){

cart++;
document.getElementById("cart-count").innerText = cart;

alert(product + " added to cart!");

gtag('event','add_to_cart',{
event_category:'ecommerce',
event_label:product
});

}

</script>

</body>
</html>
